<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RecapTube AI</title>
  <style>
    :root{
      --bg:#ffffff; --fg:#0f0f0f; --muted:#606060; --border:#e5e5e5;
      --card:#fafafa; --accent:#3ea6ff; --accent-strong:#1a73e8;
      --ok:#1e8e3e; --err:#d93025;
    }
    html[data-theme="dark"]{
      --bg:#0f0f0f; --fg:#f1f1f1; --muted:#aaaaaa; --border:#303030;
      --card:#1c1c1c; --accent:#3ea6ff; --accent-strong:#3ea6ff;
      --ok:#81c995; --err:#f28b82;
    }
    *{box-sizing:border-box;}
    body{
      width:380px;margin:0;font-family:"Roboto","Segoe UI",Arial,sans-serif;
      background:var(--bg);color:var(--fg);font-size:13px;
    }
    header{
      display:flex;align-items:center;gap:10px;padding:14px 16px;
      border-bottom:1px solid var(--border);
    }
    header .mark{color:#ff0033;font-size:20px;}
    header h1{font-size:16px;margin:0;font-weight:600;flex:1;}
    header .theme-btn{cursor:pointer;background:none;border:none;color:var(--fg);font-size:16px;}
    .section{padding:14px 16px;border-bottom:1px solid var(--border);}
    .section h2{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 10px;}
    .row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:9px 0;}
    .row label{flex:1;cursor:pointer;}
    .hint{color:var(--muted);font-size:11px;margin-top:2px;}
    select, input[type="text"], input[type="password"]{
      background:var(--bg);color:var(--fg);border:1px solid var(--border);
      border-radius:8px;padding:7px 9px;font-size:13px;max-width:190px;width:190px;
    }
    .field{display:flex;flex-direction:column;gap:6px;margin:10px 0;}
    .field > .label{font-weight:500;}
    .keyrow{display:flex;gap:6px;}
    .keyrow input{flex:1;max-width:none;width:auto;}
    button.btn{
      background:var(--accent-strong);color:#fff;border:none;border-radius:8px;
      padding:8px 12px;cursor:pointer;font-size:12px;font-weight:500;
    }
    button.btn.secondary{background:transparent;color:var(--accent-strong);border:1px solid var(--accent-strong);}
    button.btn:hover{filter:brightness(1.05);}
    .status{font-size:11px;font-weight:600;}
    .status.ok{color:var(--ok);}
    .status.err{color:var(--err);}
    /* switch */
    .switch{position:relative;display:inline-block;width:38px;height:22px;flex:0 0 auto;}
    .switch input{opacity:0;width:0;height:0;}
    .slider{position:absolute;inset:0;background:#bbb;border-radius:22px;transition:.2s;cursor:pointer;}
    .slider:before{content:"";position:absolute;height:16px;width:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
    input:checked + .slider{background:var(--accent-strong);}
    input:checked + .slider:before{transform:translateX(16px);}
    .provider-keys{display:none;}
    .provider-keys.active{display:block;}
    .whitelist-list{margin-top:8px;max-height:110px;overflow-y:auto;}
    .wl-item{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;background:var(--card);border-radius:6px;margin:4px 0;}
    .wl-item button{background:none;border:none;color:var(--err);cursor:pointer;font-size:14px;}
    .actions{display:flex;gap:8px;flex-wrap:wrap;}
    footer{padding:12px 16px;display:flex;gap:14px;justify-content:center;}
    footer a{color:var(--muted);text-decoration:none;font-size:11px;}
    footer a:hover{color:var(--accent-strong);}
    #toast{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);background:#323232;color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;opacity:0;transition:opacity .25s;pointer-events:none;max-width:340px;text-align:center;}
    #toast.show{opacity:1;}
  </style>
</head>
<body>
  <header>
    <span class="mark">▶</span>
    <h1>RecapTube AI</h1>
    <button id="theme-btn" class="theme-btn" title="Toggle theme">🌙</button>
  </header>

  <!-- Master -->
  <div class="section">
    <div class="row">
      <label for="enabled"><strong>Enable RecapTube</strong><div class="hint">Summarize &amp; chapter videos automatically</div></label>
      <span class="switch"><input type="checkbox" id="enabled" /><span class="slider"></span></span>
    </div>
  </div>

  <!-- AI provider & keys -->
  <div class="section">
    <h2>AI provider</h2>
    <div class="field">
      <span class="label">Provider</span>
      <select id="provider">
        <option value="claude">Anthropic Claude</option>
        <option value="openai">OpenAI GPT</option>
      </select>
    </div>
    <div class="field">
      <span class="label">Model</span>
      <select id="model">
        <option value="haiku" data-provider="claude">Claude Haiku (fast)</option>
        <option value="sonnet" data-provider="claude">Claude Sonnet (best)</option>
        <option value="gpt-5.5" data-provider="openai">GPT-5.5 (best)</option>
        <option value="gpt-5.4-mini" data-provider="openai">GPT-5.4 Mini (fast)</option>
        <option value="gpt-5.4-nano" data-provider="openai">GPT-5.4 Nano (cheapest)</option>
      </select>
    </div>

    <div id="claude-keys" class="provider-keys">
      <div class="field">
        <span class="label">Claude API key <span id="claude-status" class="status err">Not configured</span></span>
        <div class="keyrow">
          <input type="password" id="claude-key" placeholder="sk-ant-..." />
          <button class="btn" id="save-claude">Save</button>
        </div>
      </div>
    </div>
    <div id="openai-keys" class="provider-keys">
      <div class="field">
        <span class="label">OpenAI API key <span id="openai-status" class="status err">Not configured</span></span>
        <div class="keyrow">
          <input type="password" id="openai-key" placeholder="sk-..." />
          <button class="btn" id="save-openai">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Recap settings -->
  <div class="section">
    <h2>What to generate</h2>
    <div class="row"><label for="autoGenerate">Generate automatically<div class="hint">Off = show a "Generate" button instead (saves API cost)</div></label>
      <span class="switch"><input type="checkbox" id="autoGenerate" /><span class="slider"></span></span></div>
    <div class="row"><label for="generateSummary">Summary &amp; key points</label>
      <span class="switch"><input type="checkbox" id="generateSummary" /><span class="slider"></span></span></div>
    <div class="row"><label for="generateChapters">Auto chapters (when the video has none)</label>
      <span class="switch"><input type="checkbox" id="generateChapters" /><span class="slider"></span></span></div>
    <div class="row"><label for="showProgressMarkers">Chapter markers on the progress bar</label>
      <span class="switch"><input type="checkbox" id="showProgressMarkers" /><span class="slider"></span></span></div>
    <div class="row"><label for="autoOpenPanel">Open the panel automatically</label>
      <span class="switch"><input type="checkbox" id="autoOpenPanel" /><span class="slider"></span></span></div>

    <div class="field">
      <span class="label">Summary length</span>
      <select id="summaryLength">
        <option value="short">Short</option>
        <option value="medium">Medium</option>
        <option value="long">Long</option>
      </select>
    </div>
    <div class="field">
      <span class="label">Output language</span>
      <select id="outputLanguage">
        <option value="auto">Auto (browser language)</option>
        <option value="en">English</option>
        <option value="it">Italiano</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="pt">Português</option>
        <option value="nl">Nederlands</option>
        <option value="ru">Русский</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="zh">中文</option>
        <option value="ar">العربية</option>
        <option value="hi">हिन्दी</option>
      </select>
    </div>
  </div>

  <!-- Excluded channels -->
  <div class="section">
    <h2>Excluded channels</h2>
    <div class="actions">
      <button class="btn secondary" id="add-current">Exclude current channel</button>
    </div>
    <div class="whitelist-list" id="whitelist-list"></div>
  </div>

  <!-- Cache -->
  <div class="section">
    <h2>Cache</h2>
    <div class="actions">
      <button class="btn secondary" id="regen">Regenerate this video</button>
      <button class="btn secondary" id="clear-current">Clear this video</button>
      <button class="btn secondary" id="clear-all">Clear all</button>
    </div>
  </div>

  <footer>
    <a href="help.html" target="_blank">Help</a>
    <a href="welcome.html" target="_blank">Welcome</a>
    <a href="https://console.anthropic.com/settings/keys" target="_blank">Get Claude key</a>
    <a href="https://platform.openai.com/api-keys" target="_blank">Get OpenAI key</a>
  </footer>

  <div id="toast"></div>
  <script src="popup-bundle.js"></script>
</body>
</html>
